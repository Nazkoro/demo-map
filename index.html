<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Выгодная карта | Где поесть дёшево</title>
    <link href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
    <script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./config.js"></script>
</head>
<body>
    <div id="map"></div>
    <div id="status" class="status"></div>
    <div class="controls">
        <button type="button" class="btn btn-primary" id="addBtn">➕ Добавить заведение</button>
    </div>

    <div id="modal" class="modal">
        <div class="modal-card">
            <h3>🍜 Новое место</h3>
            <p class="modal-hint">Кликните на карту, чтобы выбрать точку</p>
            <input type="text" id="placeName" placeholder="Название заведения *" autocomplete="off">
            <input type="text" id="priceInfo" placeholder="Цены / комплексы (напр. 5-7 BYN)">
            <textarea id="description" placeholder="Что вкусного? (бургер, суп, бизнес-ланч...)"></textarea>
            <div class="modal-buttons">
                <button type="button" class="btn-cancel" id="cancelModal">Отмена</button>
                <button type="button" class="btn-submit" id="submitPlace">Сохранить</button>
            </div>
        </div>
    </div>

    <script src="./app.js"></script>
</body>
</html>
